# robot_localization EKF配置
# 自动生成于 2026-01-13 18:46:31

frequency: 50.0
sensor_timeout: 0.1
two_d_mode: false
transform_time_offset: 0.0
transform_timeout: 0.0
print_diagnostics: true
debug: false

# 世界坐标系
map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

# ========== 传感器配置 ==========

# 传感器0: VINS-Fusion输出 (位置 + 姿态)
odom0: /vins_estimator/odometry
odom0_config: [true,  true,  true,   # x, y, z
               true,  true,  true,   # roll, pitch, yaw
               false, false, false,  # vx, vy, vz (不使用VINS速度，可能有延迟)
               false, false, false,  # vroll, vpitch, vyaw
               false, false, false]  # ax, ay, az
odom0_queue_size: 10
odom0_nodelay: true
odom0_differential: false
odom0_relative: false
odom0_pose_rejection_threshold: 5.0
odom0_twist_rejection_threshold: 1.0

# 传感器1: IMU数据 (姿态 + 角速度 + 加速度)
imu0: /imu0
imu0_config: [false, false, false,  # x, y, z
              true,  true,  true,   # roll, pitch, yaw
              false, false, false,  # vx, vy, vz
              true,  true,  true,   # vroll, vpitch, vyaw
              true,  true,  true]   # ax, ay, az
imu0_nodelay: true
imu0_differential: false
imu0_relative: false
imu0_queue_size: 50
imu0_pose_rejection_threshold: 0.8
imu0_twist_rejection_threshold: 0.8
imu0_linear_acceleration_rejection_threshold: 0.8
imu0_remove_gravitational_acceleration: true

# 传感器2: 轮速计 (速度) - 改为odom1以支持nav_msgs/Odometry消息类型
odom1: /wheel_odometry
odom1_config: [false, false, false,  # x, y, z
               false, false, false,  # roll, pitch, yaw
               true,  true,  true,   # vx, vy, vz
               true,  true,  true,   # vroll, vpitch, vyaw
               false, false, false]  # ax, ay, az
odom1_queue_size: 10
odom1_rejection_threshold: 2.0

# 传感器3: 星敏感器 (仅姿态，通过pose话题)
# 注：需要将QuaternionStamped转换为PoseStamped
pose0: /star_tracker/pose
pose0_config: [false, false, false,  # x, y, z
               true,  true,  true,   # roll, pitch, yaw
               false, false, false,  # vx, vy, vz
               false, false, false,  # vroll, vpitch, vyaw
               false, false, false]  # ax, ay, az
pose0_queue_size: 10
pose0_differential: false
pose0_relative: false
pose0_rejection_threshold: 2.0

